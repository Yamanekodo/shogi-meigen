<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0f0f0f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
}
.title {
  font-size: 12px;
  color: #555;
  letter-spacing: 0.22em;
  margin-bottom: 2rem;
  text-align: center;
}
.board-btn {
  width: 190px; height: 190px;
  border-radius: 10px;
  border: 2px solid #7A5C1A;
  background: #1c1608;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
  box-shadow: 0 0 28px rgba(180,130,20,0.18);
  -webkit-tap-highlight-color: transparent;
}
.board-btn:active { transform: scale(0.96); }
.koma-svg { width: 80px; height: 80px; }
.btn-text { font-size: 11px; color: #8A7040; font-weight: 500; letter-spacing: 0.14em; }
.quote-card {
  background: #161616;
  border: 0.5px solid #3a3020;
  border-radius: 12px;
  padding: 2rem 1.75rem;
  max-width: 500px;
  width: 100%;
  text-align: center;
  display: none;
  animation: fadeIn 0.55s ease;
  box-shadow: 0 0 40px rgba(180,130,20,0.1);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.quote-koma { margin-bottom: 1.2rem; }
.quote-text {
  font-size: 17px;
  font-weight: 500;
  color: #E8D9B0;
  line-height: 1.9;
  margin-bottom: 1.2rem;
}
.quote-author {
  font-size: 12px;
  color: #6a5a30;
  letter-spacing: 0.12em;
}
.again-btn {
  margin-top: 1.5rem;
  padding: 10px 32px;
  border: 0.5px solid #3a3020;
  border-radius: 8px;
  background: transparent;
  color: #7a6a40;
  font-size: 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.again-btn:active { background: #1f1c10; }
.particles { position: fixed; pointer-events: none; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; }
.particle {
  position: absolute;
  font-size: 18px;
  font-family: serif;
  font-weight: bold;
  color: #C89A2A;
  animation: burst 1.5s ease-out forwards;
}
@keyframes burst {
  0%   { opacity: 1; transform: translate(0,0) scale(1.1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.1); }
}
.flash {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(160,110,10,0.18);
  z-index: 998;
  animation: flashFade 0.6s ease-out forwards;
  pointer-events: none;
}
@keyframes flashFade { from { opacity: 1; } to { opacity: 0; } }
</style>

<script>
const quotes = [
  { text: "プライドを優先して勝てるほど甘い世界じゃない。それは二の次で結果が全て。", author: "渡辺明" },
  { text: "自分が嫌だなと思うことを我慢してまではやらない。そこまで私は人が良くない。", author: "渡辺明" },
  { text: "苦しい局面ほど、冷静に。感情を盤に持ち込まないことが大事。", author: "渡辺明" },
  { text: "研究は裏切らない。準備した分だけ、盤上で返ってくる。", author: "渡辺明" },
  { text: "負けたら悔しい。その悔しさを次の一手への燃料にする。", author: "渡辺明" },
  { text: "強くなりたければ、自分の負けた棋譜を何度も並べることだ。", author: "渡辺明" },
  { text: "詰将棋は将棋の筋肉トレーニング。地味だけど、これをやった人間は強くなる。", author: "渡辺明" },
  { text: "直感の七割は正しい。", author: "羽生善治" },
  { text: "十年、二十年、三十年と同じ姿勢で同じ情熱を傾けられることが才能だと思っている。", author: "羽生善治" },
  { text: "すでに過ぎ去ったことは仕方がない。反省は勝負がついた後でいい。", author: "羽生善治" },
  { text: "大切なのは過程です。結果だけなら、ジャンケンでいい。", author: "羽生善治" },
  { text: "夢は目指した時から目標に変わる。", author: "羽生善治" },
  { text: "平常心をどれだけ維持できるかで勝負は決まる。", author: "羽生善治" },
  { text: "運命は勇者に微笑む。", author: "羽生善治" },
  { text: "報われないかもしれないところで、同じ情熱・気力・モチベーションをもって継続すること、それこそが才能だと思っている。", author: "羽生善治" },
  { text: "積極的にリスクを負うことは未来のリスクを最小限にする、といつも自分に言い聞かせている。", author: "羽生善治" },
  { text: "一歩千金。", author: "羽生善治（最も重要な格言として選出）" },
  { text: "読み切っていれば怖くない。", author: "羽生善治" },
  { text: "もし将棋の神様がいるのなら、僕と一局お手合わせ願いたい。", author: "羽生善治" },
  { text: "いい時は焦らない。悪い時は諦めない。", author: "谷川浩司" },

  { text: "勝負師である限り、命が尽きるまで勝負に明け暮れるのが、棋士としての私の運命。", author: "加藤一二三" },

let deck = [];
let lastIdx = -1;

function buildDeck() {
  deck = quotes.map((_, i) => i);
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  if (deck[0] === lastIdx && deck.length > 1) [deck[0], deck[1]] = [deck[1], deck[0]];
}

function playShakin() {
  const audio = document.getElementById('shakin');
  if (audio) {
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }
}

function showQuote() {
  if (deck.length === 0) buildDeck();
  const idx = deck.shift();
  lastIdx = idx;
  const q = quotes[idx];
  triggerEffects();
  setTimeout(() => {
    document.getElementById('btnArea').style.display = 'none';
    const card = document.getElementById('quoteCard');
    card.style.display = 'block';
    card.style.animation = 'none';
    void card.offsetWidth;
    card.style.animation = 'fadeIn 0.55s ease';
    document.getElementById('quoteText').textContent = q.text;
    document.getElementById('quoteAuthor').textContent = '— ' + q.author;
  }, 350);
}

function triggerEffects() {
  const pieces = ['王', '飛', '角', '金', '銀', '桂', '香', '歩'];
  const container = document.getElementById('particles');
  container.innerHTML = '';
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('span');
    el.className = 'particle';
    el.textContent = pieces[Math.floor(Math.random() * pieces.length)];
    const sx = 20 + Math.random() * 60;
    const sy = 20 + Math.random() * 50;
    const tx = (Math.random() - 0.5) * 300 + 'px';
    const ty = (Math.random() * -200 - 60) + 'px';
    el.style.cssText += 'left:' + sx + '%; top:' + sy + '%; --tx:' + tx + '; --ty:' + ty + '; animation-delay:' + (Math.random()*0.12) + 's;';
    container.appendChild(el);
  }
  const flash = document.createElement('div');
  flash.className = 'flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 700);
  playShakin();
}
</script>
